/* ── SPRINT VIEW ── */
function SprintView({sprint,tasks,saveSt,saveNote,exp,setExp,sstats}){
  const {done,block,prog,total,pct}=sstats(sprint);
  const bc=block>0?'#f0883e':pct===100?'#238636':'#1f6feb';
  return html`<div>
    <div style=${{marginBottom:14}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:6}}>
        <div>
          <div style=${{fontSize:16,fontWeight:600}}>${sprint.name}</div>
          <div style=${{fontSize:11,color:'#8b949e',marginTop:2}}>${sprint.period} · ${total} tasks</div>
        </div>
        <div style=${{display:'flex',gap:14,fontSize:12,alignItems:'center'}}>
          ${prog>0&&html`<span style=${{color:'#388bfd'}}>● ${prog} in progress</span>`}
          ${block>0&&html`<span style=${{color:'#f0883e'}}>⊘ ${block} blocked</span>`}
          <span style=${{color:'#3fb950',fontWeight:600}}>✓ ${done}/${total}</span>
        </div>
      </div>
      <div style=${{marginTop:8,background:'#21262d',borderRadius:4,height:7}}>
        <div style=${{background:bc,borderRadius:4,height:7,width:pct+'%',transition:'width .4s'}}/>
      </div>
    </div>
    <div style=${{display:'flex',gap:12,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      ${Object.entries(ST).map(([k,s])=>html`
        <span key=${k} style=${{fontSize:10,color:s.color,display:'flex',alignItems:'center',gap:4}}>
          <span style=${{width:8,height:8,borderRadius:2,background:s.color,display:'inline-block'}}/>
          ${s.label}
        </span>`)}
      <span style=${{fontSize:10,color:'#484f58',marginLeft:4}}>· Click status · ✏ for notes</span>
    </div>
    <div style=${{display:'flex',flexDirection:'column',gap:6}}>
      ${sprint.tasks.map(task=>{
        const t=gT(tasks,task.id), s=ST[t.status]||ST.not_started;
        const pr=PRI[task.priority]||PRI.MED, isOv=ov(task.due,t.status);
        const open=!!exp[task.id], hasN=t.note&&t.note.trim().length>0;
        return html`<div key=${task.id} style=${{
          background:s.bg, borderRadius:7, overflow:'hidden',
          border:`1px solid ${isOv&&t.status!=='done'?'#da3633':s.border}`,
          borderLeft:`4px solid ${s.color}`,
        }}>
          <div style=${{padding:'10px 12px',display:'flex',alignItems:'flex-start',gap:10}}>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontSize:13,lineHeight:1.4,
                textDecoration:t.status==='done'?'line-through':'none',
                color:t.status==='done'?'#6e7681':'#e6edf3'}}>
                ${task.text}
              </div>
              <div style=${{display:'flex',gap:8,marginTop:5,alignItems:'center',flexWrap:'wrap'}}>
                <span style=${{fontSize:10,color:isOv?'#f85149':'#8b949e'}}>
                  ${isOv?'⚠ OVERDUE · ':''}Due ${task.due}
                </span>
                <span style=${{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:9,background:pr.bg,color:pr.color}}>
                  ${task.priority}
                </span>
              </div>
              <div style=${{display:'flex',gap:5,marginTop:8,flexWrap:'wrap'}}>
                ${SK.map(k=>{
                  const ss=ST[k], ac=t.status===k;
                  return html`<button key=${k} onClick=${()=>saveSt(task.id,k)} style=${{
                    fontSize:10,padding:'3px 9px',borderRadius:10,
                    border:`1px solid ${ac?ss.color:'#30363d'}`,
                    background:ac?ss.bg:'transparent',
                    color:ac?ss.color:'#6e7681', fontWeight:ac?700:400,
                  }}>${ac?'● ':''}${ss.label}</button>`;
                })}
              </div>
              ${!open&&hasN&&html`<div style=${{marginTop:6,fontSize:11,color:'#8b949e',fontStyle:'italic',
                whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:500}}>
                📝 ${t.note}
              </div>`}
            </div>
            <button onClick=${()=>setExp(p=>({...p,[task.id]:!p[task.id]}))} style=${{
              background:hasN?'#1c2333':'transparent',
              border:`1px solid ${hasN?'#388bfd':'#30363d'}`,
              borderRadius:6,padding:'4px 8px',
              color:hasN?'#388bfd':'#6e7681',fontSize:13,flexShrink:0,marginTop:2,
            }}>${open?'✏ ▲':'✏'}</button>
          </div>
          ${open&&html`<div style=${{borderTop:'1px solid #30363d',padding:'10px 12px',background:'#0d1117'}}>
            <div style=${{fontSize:10,color:'#8b949e',marginBottom:6,fontWeight:600,letterSpacing:'.08em'}}>NOTES / COMMENTS</div>
            <textarea defaultValue=${t.note||''} onBlur=${e=>saveNote(task.id,e.target.value)}
              placeholder="Add notes, blockers, context, or next steps…" rows=3
              style=${{width:'100%',background:'#161b22',border:'1px solid #30363d',borderRadius:5,
                color:'#e6edf3',fontSize:12,padding:'8px 10px',lineHeight:1.5,boxSizing:'border-box'}}/>
            <div style=${{fontSize:10,color:'#484f58',marginTop:4}}>Notes save when you click outside the text box.</div>
          </div>`}
        </div>`;
      })}
    </div>
    <div style=${{marginTop:18,background:'#0d1f35',border:'1px solid #1f6feb',borderRadius:8,padding:'11px 15px'}}>
      <div style=${{fontSize:9,color:'#388bfd',fontWeight:700,letterSpacing:'.1em',marginBottom:5}}>SPRINT ${sprint.id} EXIT GATE</div>
      <div style=${{fontSize:11,color:'#8b949e',lineHeight:1.8}}>${sprint.gate}</div>
    </div>
  </div>`;
}

/* ── MILESTONES VIEW ── */
function MilestonesView({state,toggle}){
  const sc={1:'#388bfd',2:'#a371f7',3:'#e3b341',4:'#3fb950',5:'#f85149'};
  return html`<div>
    <div style=${{fontSize:16,fontWeight:600,marginBottom:4}}>Key Milestones</div>
    <div style=${{fontSize:11,color:'#8b949e',marginBottom:14}}>Click a milestone to mark it complete.</div>
    <div style=${{display:'flex',flexDirection:'column',gap:6}}>
      ${MS.map(m=>{
        const done=!!state[m.id], isOv=ov(m.date,done?'done':'not_started');
        return html`<div key=${m.id} onClick=${()=>toggle(m.id)} style=${{
          background:done?'#0d2e17':'#161b22',
          border:`1px solid ${done?'#238636':isOv?'#da3633':m.crit?'#da3633':'#30363d'}`,
          borderLeft:`4px solid ${done?'#238636':isOv?'#f85149':m.crit?'#f85149':'#30363d'}`,
          borderRadius:7,padding:'11px 14px',cursor:'pointer',
          display:'flex',alignItems:'center',gap:12,opacity:done?.65:1,userSelect:'none',
        }}>
          <div style=${{width:17,height:17,borderRadius:'50%',flexShrink:0,
            border:`2px solid ${done?'#238636':m.crit?'#f85149':'#484f58'}`,
            background:done?'#238636':'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:11}}>
            ${done?'✓':''}
          </div>
          <div style=${{flex:1}}>
            <div style=${{fontSize:13,lineHeight:1.4,textDecoration:done?'line-through':'none',color:done?'#6e7681':'#e6edf3'}}>
              ${m.text}
              ${m.crit&&!done&&html`<span style=${{marginLeft:8,fontSize:9,fontWeight:700,color:'#f85149',background:'#3d1a1a',padding:'1px 6px',borderRadius:8}}>CRITICAL GATE</span>`}
            </div>
            <div style=${{display:'flex',gap:10,marginTop:4,alignItems:'center'}}>
              <span style=${{fontSize:10,color:isOv&&!done?'#f85149':'#8b949e'}}>
                ${isOv&&!done?'⚠ OVERDUE · ':''}${m.date}
              </span>
              <span style=${{fontSize:9,fontWeight:600,padding:'1px 7px',borderRadius:8,background:'#21262d',color:sc[m.sprint]}}>
                Sprint ${m.sprint}
              </span>
            </div>
          </div>
        </div>`;
      })}
    </div>
  </div>`;
}

/* ── APP ── */
function App(){
  const [tasks,  setT] = useState({});
  const [msState,setM] = useState({});
  const [tab,   setTab]= useState(1);
  const [exp,   setExp]= useState({});
  const [load,  setL]  = useState(true);
  const [saved, setSv] = useState(false);
  const [err,   setE]  = useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const {data:td,error:te}=await db.from('tasks').select('*');
        if(te)throw te;
        const tm={};(td||[]).forEach(t=>{tm[t.id]={status:t.status,note:t.note};});
        setT(tm);
        const {data:md,error:me}=await db.from('milestones').select('*');
        if(me)throw me;
        const mm={};(md||[]).forEach(m=>{mm[m.id]=m.completed;});
        setM(mm);
      }catch(e){setE('Database error: '+(e.message||String(e)));}
      setL(false);
    })();
  },[]);

  const flash=()=>{setSv(true);setTimeout(()=>setSv(false),1500);};

  const saveSt=(id,ns)=>setT(p=>{
    const c=p[id]||{status:'not_started',note:''};
    db.from('tasks').upsert({id,status:ns,note:c.note||'',updated_at:new Date().toISOString()}).then(flash);
    return{...p,[id]:{...c,status:ns}};
  });

  const saveNote=(id,note)=>setT(p=>{
    const c=p[id]||{status:'not_started',note:''};
    db.from('tasks').upsert({id,status:c.status||'not_started',note,updated_at:new Date().toISOString()}).then(flash);
    return{...p,[id]:{...c,note}};
  });

  const toggleMs=id=>setM(p=>{
    const v=!p[id];
    db.from('milestones').upsert({id,completed:v,updated_at:new Date().toISOString()}).then(flash);
    return{...p,[id]:v};
  });

  const sstats=s=>{
    const done =s.tasks.filter(t=>gT(tasks,t.id).status==='done').length;
    const block=s.tasks.filter(t=>gT(tasks,t.id).status==='blocked').length;
    const prog =s.tasks.filter(t=>gT(tasks,t.id).status==='in_progress').length;
    return{done,block,prog,total:s.tasks.length,pct:Math.round(done/s.tasks.length*100)};
  };

  const tt  = SPRINTS.reduce((a,s)=>a+s.tasks.length,0);
  const td2 = SPRINTS.reduce((a,s)=>a+s.tasks.filter(t=>gT(tasks,t.id).status==='done').length,0);
  const op  = Math.round(td2/tt*100);
  const md  = MS.filter(m=>msState[m.id]).length;
  const sp  = SPRINTS.find(s=>s.id===tab);

  if(load) return html`<div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#8b949e'}}>
    <div style=${{textAlign:'center'}}><div style=${{fontSize:28,marginBottom:10}}>⏳</div><div>Loading Project TRAVERSE…</div></div>
  </div>`;

  if(err) return html`<div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style=${{textAlign:'center',maxWidth:480}}>
      <div style=${{fontSize:28,marginBottom:10}}>⚠️</div>
      <div style=${{fontWeight:600,color:'#f85149',marginBottom:8}}>Database Connection Error</div>
      <div style=${{color:'#8b949e',fontSize:12}}>${err}</div>
    </div>
  </div>`;

  return html`<div style=${{minHeight:'100vh'}}>
    <div style=${{background:'#161b22',borderBottom:'1px solid #30363d',padding:'14px 20px'}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
        <div>
          <div style=${{fontSize:10,color:'#8b949e',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>
            Grand Traverse County · IT Administration · CONFIDENTIAL
          </div>
          <div style=${{fontSize:19,fontWeight:700}}>
            Project TRAVERSE
            <span style=${{color:'#8b949e',fontSize:12,fontWeight:400,marginLeft:10}}>AS/400 Sunset Migration</span>
          </div>
          <div style=${{fontSize:10,color:'#8b949e',marginTop:3}}>
            Sponsor: Nate Alger · PM: Cliff DuPuy · Leads: Scott Kurtzal · Jeremiah Priest
          </div>
        </div>
        <div style=${{display:'flex',gap:12,alignItems:'center'}}>
          ${saved&&html`<span style=${{fontSize:11,color:'#3fb950'}}>Saved ✓</span>`}
          <div style=${{textAlign:'center',background:'#0d1117',border:'1px solid #30363d',borderRadius:8,padding:'7px 13px'}}>
            <div style=${{fontSize:24,fontWeight:700,color:'#f85149',lineHeight:1}}>${DAYS_LEFT}</div>
            <div style=${{fontSize:9,color:'#8b949e',letterSpacing:'.08em',marginTop:2}}>DAYS LEFT</div>
          </div>
          <div style=${{background:'#3d1a1a',border:'1px solid #f85149',borderRadius:6,padding:'5px 10px',fontSize:10,fontWeight:700,color:'#f85149'}}>
            ⚠ RISK: HIGH
          </div>
        </div>
      </div>
      <div style=${{marginTop:12}}>
        <div style=${{display:'flex',justifyContent:'space-between',fontSize:10,color:'#8b949e',marginBottom:4}}>
          <span>OVERALL PROGRESS</span>
          <span>${td2}/${tt} tasks · ${op}% · ${md}/${MS.length} milestones</span>
        </div>
        <div style=${{background:'#21262d',borderRadius:3,height:6}}>
          <div style=${{background:'#1f6feb',borderRadius:3,height:6,width:op+'%',transition:'width .4s'}}/>
        </div>
      </div>
    </div>

    <div style=${{background:'#2d0f0f',borderBottom:'2px solid #f85149',padding:'8px 20px',display:'flex',gap:10,alignItems:'flex-start'}}>
      <span style=${{fontSize:16,flexShrink:0}}>⚠️</span>
      <div style=${{fontSize:11,lineHeight:1.5}}>
        <strong style=${{color:'#f85149'}}>CRITICAL PATH — ImageSoft / MiFILE: </strong>
        <span style=${{color:'#ffa198'}}>Confirm AWS S3 or SFTP endpoint feasibility by <strong>July 20</strong>. Gates Sprint 3 Lambda design. CCEFEXT serves the 13th Judicial Circuit — disruption halts e-filing across GTC, Leelanau & Antrim. <strong>Schedule call before Jun 30.</strong></span>
      </div>
    </div>

    <div style=${{background:'#161b22',borderBottom:'1px solid #30363d',padding:'0 20px',display:'flex',gap:2,overflowX:'auto'}}>
      ${SPRINTS.map(s=>{
        const ss=sstats(s), ac=tab===s.id;
        return html`<button key=${s.id} onClick=${()=>setTab(s.id)} style=${{
          padding:'9px 13px',background:'none',border:'none',whiteSpace:'nowrap',
          borderBottom:ac?'2px solid #1f6feb':'2px solid transparent',
          color:ac?'#e6edf3':'#8b949e',fontSize:12,
        }}>
          <span style=${{fontWeight:700,color:s.status==='active'?'#3fb950':undefined}}>${s.num}</span>
          ${s.status==='active'&&html`<span style=${{marginLeft:5,background:'#0d2e17',color:'#3fb950',borderRadius:8,padding:'1px 6px',fontSize:9,fontWeight:600}}>ACTIVE</span>`}
          <span style=${{marginLeft:6,color:'#8b949e',fontSize:10}}>${ss.done}/${ss.total}</span>
          ${ss.block>0&&html`<span style=${{marginLeft:4,color:'#f0883e',fontSize:10}}>⊘${ss.block}</span>`}
        </button>`;
      })}
      <button onClick=${()=>setTab(0)} style=${{
        padding:'9px 13px',background:'none',border:'none',whiteSpace:'nowrap',
        borderBottom:tab===0?'2px solid #1f6feb':'2px solid transparent',
        color:tab===0?'#e6edf3':'#8b949e',fontSize:12,
      }}>Milestones <span style=${{color:'#8b949e',fontSize:10}}>${md}/${MS.length}</span></button>
    </div>

    <div style=${{padding:'18px 20px',maxWidth:860}}>
      ${tab===0
        ? html`<${MilestonesView} state=${msState} toggle=${toggleMs}/>`
        : sp
          ? html`<${SprintView} sprint=${sp} tasks=${tasks} saveSt=${saveSt} saveNote=${saveNote} exp=${exp} setExp=${setExp} sstats=${sstats}/>`
          : null}
    </div>
  </div>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
